sentry {
    org = "af-developments"
    projectName = "shizukuplus"
    def sentryToken = System.getenv("SENTRY_AUTH_TOKEN") ?: project.findProperty("SENTRY_AUTH_TOKEN")
    authToken = sentryToken ?: ""
    
    if (sentryToken == null || sentryToken.isEmpty()) {
        uploadNativeSymbols = false
        includeNativeSources = false
        includeSourceContext = false
        autoUploadProguardMapping = provider { false }
    } else {
        uploadNativeSymbols = true
        includeNativeSources = true
        includeSourceContext = true
        autoUploadProguardMapping = provider { true }
    }
    
    // Track releases with git commit info
    ignoredBuildTypes = ["debug"]

    // Project uses Glance (compose-based widgets) but not full compose-ui.
    // Disable Sentry's compose bytecode instrumentation to avoid R8 missing-class errors.
    tracingInstrumentation {
        enabled = false
    }
}

