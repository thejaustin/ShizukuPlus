name: Build App

on:
  push:
    branches:
      - master
  workflow_dispatch:
    inputs:
      debug:
        description: 'Debug'
        type: boolean
        required: false
        default: false
      prerelease:
        description: 'Prerelease'
        type: boolean
        required: false
        default: false

jobs:
  lint:
    runs-on: ubuntu-latest
    env:
      ANDROID_HOME: "/usr/local/lib/android/sdk"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'
          fetch-depth: 0

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Accept SDK Licenses
        run: yes | ${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null || true

      - name: Run Lint
        run: ./gradlew :manager:lint

  build:
    runs-on: ubuntu-latest
    
    env:
      ANDROID_HOME: "/usr/local/lib/android/sdk"
      KEYSTORE: ${{ secrets.KEYSTORE }}
      SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
      SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
      IS_DEBUG: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.debug == true }}
      IS_PRERELEASE: ${{ (github.event_name == 'push' && github.ref_name == 'master') || (github.event_name == 'workflow_dispatch' && github.event.inputs.prerelease == true) }}

    outputs:
      artifactName: ${{ steps.buildWithGradle.outputs.artifactName }}
      versionName: ${{ steps.buildWithGradle.outputs.versionName }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'
          fetch-depth: 0

      - name: Cache Android SDK
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.ANDROID_HOME }}/build-tools
            ${{ env.ANDROID_HOME }}/platforms
            ${{ env.ANDROID_HOME }}/platform-tools
          key: android-sdk-${{ runner.os }}-${{ hashFiles('manager/build.gradle', 'gradle/libs.versions.toml') }}
          restore-keys: |
            android-sdk-${{ runner.os }}-



      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Create signing.properties
        if: ${{ env.IS_DEBUG == 'false' && env.KEYSTORE != '' }}
        run: |
          echo KEYSTORE_PASSWORD=${{ secrets.KEYSTORE_PASSWORD }} > signing.properties
          echo KEYSTORE_ALIAS=${{ secrets.KEYSTORE_ALIAS }} >> signing.properties
          echo KEYSTORE_ALIAS_PASSWORD='${{ secrets.KEYSTORE_ALIAS_PASSWORD }}' >> signing.properties
          echo KEYSTORE_FILE=${{ github.workspace }}/key.jks >> signing.properties
          printf "%s" "${{ secrets.KEYSTORE }}" | base64 --decode > key.jks

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          build-scan-publish: true
          build-scan-terms-of-use-url: "https://gradle.com/terms-of-service"
          build-scan-terms-of-use-agree: "yes"

      - name: Pre-Push Guard
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null || true
          chmod +x pre-push-guard/scripts/pre_push_check.sh
          bash pre-push-guard/scripts/pre_push_check.sh

      - name: Build with Gradle
        id: buildWithGradle
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null || true
          [ -n "$SENTRY_DSN" ] && echo "SENTRY_DSN=${SENTRY_DSN}" >> gradle.properties || true

          # Extract version from build.gradle
          BASE_VERSION=$(grep "baseVersionName =" build.gradle | cut -d'"' -f2)
          GIT_COUNT=$(git rev-list --count HEAD)
          
          if [ "$IS_PRERELEASE" = "true" ]; then
            VERSION="v${BASE_VERSION}.r${GIT_COUNT}"
            ARGS="-Pbeta"
          else
            VERSION="v${BASE_VERSION}.r${GIT_COUNT}"
            ARGS=""
          fi
          
          echo "$VERSION" > version.txt
          echo "versionName=${VERSION}" >> $GITHUB_OUTPUT

          export GRADLE_OPTS="-Xmx4g -XX:MaxMetaspaceSize=512m -XX:+HeapDumpOnOutOfMemoryError"

          if [ "$IS_DEBUG" = "true" ]; then
            CMD="./gradlew :manager:assembleShizukuplusDebug"
            eval $CMD --stacktrace --info -x :manager:lint
            FILE=$(find manager/build/outputs/apk/shizukuplus/debug -name "*.apk" -type f | head -1)
            [ -z "$FILE" ] && { echo "Error: No debug APK found"; exit 1; }
            RENAMED="$(dirname "$FILE")/shizukuplus-debug.apk"
            mv "$FILE" "$RENAMED"
            echo "artifactName=shizukuplus-debug.apk" >> $GITHUB_OUTPUT
            echo "filePath=${RENAMED}" >> $GITHUB_OUTPUT
          else
            CMD="./gradlew :manager:assembleShizukuplusRelease :manager:assembleDropinRelease :manager:assembleCompatRelease $ARGS"
            eval $CMD --stacktrace --info \
              -x uploadSentryProguardMappingsShizukuplusRelease \
              -x uploadSentryProguardMappingsDropinRelease \
              -x uploadSentryProguardMappingsCompatRelease \
              -x uploadSentryNativeSymbolsForShizukuplusRelease \
              -x uploadSentryNativeSymbolsForDropinRelease \
              -x uploadSentryNativeSymbolsForCompatRelease \
              -x sentryUploadSourceBundleShizukuplusRelease \
              -x sentryUploadSourceBundleDropinRelease \
              -x sentryUploadSourceBundleCompatRelease \
              -x :manager:lint

            sign_apk() {
              local FILE="$1"
              if ! unzip -l "$FILE" | grep -q "META-INF/.*\.RSA"; then
                echo "WARNING: APK appears unsigned: $FILE"
                if [ -f "key.jks" ]; then
                  BUILD_TOOLS_VERSION=$(ls $ANDROID_HOME/build-tools | sort -V | tail -n 1)
                  $ANDROID_HOME/build-tools/$BUILD_TOOLS_VERSION/apksigner sign --ks key.jks \
                    --ks-pass "pass:${{ secrets.KEYSTORE_PASSWORD }}" \
                    --ks-key-alias "${{ secrets.KEYSTORE_ALIAS }}" \
                    --key-pass "pass:${{ secrets.KEYSTORE_ALIAS_PASSWORD }}" \
                    "$FILE"
                fi
              fi
            }

            PLUS_FILE=$(find manager/build/outputs/apk/shizukuplus/release -name "*.apk" -type f | head -1)
            DROPIN_FILE=$(find manager/build/outputs/apk/dropin/release -name "*.apk" -type f | head -1)
            [ -z "$PLUS_FILE" ] && { echo "Error: No ShizukuPlus APK found"; exit 1; }
            [ -z "$DROPIN_FILE" ] && { echo "Error: No drop-in APK found"; exit 1; }

            sign_apk "$PLUS_FILE"
            sign_apk "$DROPIN_FILE"

            PLUS_RENAMED="$(dirname "$PLUS_FILE")/shizukuplus.apk"
            DROPIN_RENAMED="$(dirname "$DROPIN_FILE")/shizuku-dropin.apk"
            mv "$PLUS_FILE" "$PLUS_RENAMED"
            mv "$DROPIN_FILE" "$DROPIN_RENAMED"

            # Also collect the compat stub APK (built by copyCompatApkRelease as a dependency)
            COMPAT_FILE=$(find compat/build/outputs/apk/release -name "*.apk" -type f | head -1)
            if [ -n "$COMPAT_FILE" ]; then
              sign_apk "$COMPAT_FILE"
              COMPAT_RENAMED="$(dirname "$COMPAT_FILE")/shizuku-compat.apk"
              mv "$COMPAT_FILE" "$COMPAT_RENAMED"
              echo "compatPath=${COMPAT_RENAMED}" >> $GITHUB_OUTPUT
            fi

            echo "artifactName=shizukuplus.apk" >> $GITHUB_OUTPUT
            echo "filePath=${PLUS_RENAMED}" >> $GITHUB_OUTPUT
            echo "dropinPath=${DROPIN_RENAMED}" >> $GITHUB_OUTPUT
          fi

      - name: Upload Sentry Debug Symbols
        if: ${{ env.SENTRY_AUTH_TOKEN != '' && env.IS_DEBUG == 'false' }}
        continue-on-error: true
        run: |
          ./gradlew :manager:uploadSentryProguardMappingsShizukuplusRelease :manager:uploadSentryNativeSymbolsForShizukuplusRelease

      - name: Upload ShizukuPlus Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.buildWithGradle.outputs.artifactName }}
          path: ${{ steps.buildWithGradle.outputs.filePath }}

      - name: Upload Drop-in Artifact
        if: ${{ steps.buildWithGradle.outputs.dropinPath != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: shizuku-dropin.apk
          path: ${{ steps.buildWithGradle.outputs.dropinPath }}

      - name: Upload Compat Stub Artifact
        if: ${{ steps.buildWithGradle.outputs.compatPath != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: shizuku-compat.apk
          path: ${{ steps.buildWithGradle.outputs.compatPath }}

      - name: Upload Version File
        uses: actions/upload-artifact@v4
        with:
          name: version-file
          path: version.txt

  smoke-test:
    if: ${{ github.event_name == 'workflow_dispatch' }}
    needs: [build]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'
          fetch-depth: 0

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Enable KVM hardware acceleration
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Create signing.properties (debug key)
        run: |
          cat <<'EOF' > signing.properties
          KEYSTORE_PASSWORD=android
          KEYSTORE_ALIAS=androiddebugkey
          KEYSTORE_ALIAS_PASSWORD=android
          KEYSTORE_FILE=../debug.jks
          EOF
          keytool -genkeypair -v -keystore debug.jks -storepass android \
            -alias androiddebugkey -keypass android \
            -keyalg RSA -keysize 2048 -validity 1 \
            -dname "CN=Smoke Test, O=CI, C=US" 2>/dev/null

      - name: Run JNI smoke tests on emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30
          arch: x86_64
          profile: pixel_2
          emulator-options: -no-window -no-audio -no-boot-anim -gpu swiftshader_indirect
          disable-animations: true
          script: |
            yes | /usr/local/lib/android/sdk/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null 2>&1 || true
            echo 'org.gradle.caching=true' >> gradle.properties
            ./gradlew :manager:connectedDebugAndroidTest \
              -Pandroid.testInstrumentationRunnerArguments.class=af.shizuku.manager.JniSmokeTest \
              --stacktrace 2>&1 | tee smoke-test.log
            grep -E "PASSED|FAILED|ERROR" smoke-test.log || true

      - name: Upload smoke test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-test-results
          path: manager/build/outputs/androidTest-results/

  release:
    needs: [build, lint]
    if: ${{ !failure() && !cancelled() && ((github.event_name == 'push' && github.ref_name == 'master') || (github.event_name == 'workflow_dispatch' && github.event.inputs.debug != true)) }}
    runs-on: ubuntu-latest
    permissions:
      contents: write

    env:
      IS_PRERELEASE: ${{ (github.event_name == 'push' && github.ref_name == 'master') || (github.event_name == 'workflow_dispatch' && github.event.inputs.prerelease == true) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download Version File
        uses: actions/download-artifact@v4
        with:
          name: version-file

      - name: Read Version
        id: version
        run: |
          VERSION=$(cat version.txt)
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Create Release Tag
        run: |
          TAG_NAME="${VERSION}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git rev-parse "$TAG_NAME" >/dev/null 2>&1; then
            git tag -d "$TAG_NAME"
            git push origin ":refs/tags/$TAG_NAME" || true
          fi
          git tag "$TAG_NAME" -m "Release version $VERSION"
          git push origin "$TAG_NAME"

      - name: Download ShizukuPlus Artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.build.outputs.artifactName }}
          path: files/main

      - name: Download Drop-in Artifact
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: shizuku-dropin.apk
          path: files/dropin

      - name: Download Compat Stub Artifact
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: shizuku-compat.apk
          path: files/compat

      - name: Generate Release Notes
        id: release_notes
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG_NAME="${VERSION}"
          # Find the previous release tag (ignoring current and non-version tags)
          PREV_TAG=$(git tag --list '*13.6.0.r*' --sort=-creatordate | grep -v "^${TAG_NAME}$" | head -1)

          # Most recent MAJOR release to spotlight in every release's notes. Bump these two lines
          # when a new headline release ships (keep MAJOR_DESC to one short clause). For the CURRENT
          # build the headline major == the era major, so a single callout is correct here. When you
          # bump this, also re-run scripts/backfill_majors.py (add the new major to its MAJORS list)
          # so older release pages show BOTH this headline and the major of their own era.
          MAJOR_RELEASE="v13.6.0.r2149"
          MAJOR_DESC="SU Bridge now works with third-party root apps — apps like Swift Backup can use their root-only features on non-rooted devices by pointing their custom-su path at Shizuku+ (the bridge now authenticates as the calling app, fixing the long-standing caller-identity bug, and deploys to an exec-permitted location)."
          
          {
            echo "# ${TAG_NAME}"
            echo
            
            if [ -n "$PREV_TAG" ]; then
              RANGE="${PREV_TAG}..HEAD"
              echo "## Changes since ${PREV_TAG}"
            else
              RANGE="HEAD"
              echo "## Recent Changes"
            fi
            echo

            # Categorized Commits
            FEATS=$(git log "$RANGE" --no-merges --grep="^feat" --pretty=format:"- %s (%h)" || true)
            if [ -n "$FEATS" ]; then
              echo "### ✨ New Features"
              echo "$FEATS"
              echo
            fi

            FIXES=$(git log "$RANGE" --no-merges --grep="^fix" --pretty=format:"- %s (%h)" || true)
            if [ -n "$FIXES" ]; then
              echo "### 🐛 Bug Fixes"
              echo "$FIXES"
              echo
            fi

            OTHERS=$(git log "$RANGE" --no-merges --grep="^feat" --grep="^fix" --invert-grep --pretty=format:"- %s (%h)" || true)
            if [ -n "$OTHERS" ]; then
              echo "### 🔧 Improvements & Refactors"
              echo "$OTHERS"
              echo
            fi

            # Recent releases rollup (last 5 tags, current first), spotlighting the major release.
            echo
            echo "## 📦 Recent Releases"
            echo
            if [ -n "$MAJOR_RELEASE" ]; then
              echo "> 🚀 **Most recent major release — [${MAJOR_RELEASE}](https://github.com/${{ github.repository }}/releases/tag/${MAJOR_RELEASE})**"
              echo "> ${MAJOR_DESC}"
              echo
            fi
            echo "| Release | Highlight |"
            echo "|:--|:--|"
            for t in $(git tag --list '*13.6.0.r*' --sort=-creatordate | head -5); do
              SUBJ=$(git log -1 --pretty=%s "$t" 2>/dev/null | sed 's/|/\\|/g')
              MARK=""
              if [ "$t" = "$MAJOR_RELEASE" ]; then MARK=" 🚀 **major**"; fi
              if [ "$t" = "$TAG_NAME" ]; then MARK="${MARK} _(this release)_"; fi
              echo "| [${t}](https://github.com/${{ github.repository }}/releases/tag/${t})${MARK} | ${SUBJ} |"
            done

            if [ -n "$PREV_TAG" ]; then
              echo
              echo "---"
              echo "[Full Changelog](https://github.com/${{ github.repository }}/compare/${PREV_TAG}...${TAG_NAME})"
            fi
          } > release_notes.md
          echo "NOTES_FILE=release_notes.md" >> $GITHUB_ENV

      - name: Create Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG_NAME="${VERSION}"
          # Rename each built APK to a versioned, self-identifying filename before attaching (#340).
          #
          # Select each asset by its VERIFIED applicationId, not by "first .apk in a directory". The
          # ShizukuPlus artifact download landed multiple APKs in files/main, so the old
          # `find files/main | head -1` grabbed the Drop-In and published it as the Plus asset —
          # every release r2141..r2152 shipped the Drop-In (moe.shizuku.privileged.api) under BOTH the
          # Plus and Drop-In names, so the standard af.shizuku.plus.api build (the coexist-with-stock
          # one) never reached users and wouldn't install alongside stock Shizuku.
          ASSETS=()
          # applicationId of an APK, read from its FileProvider authority (${applicationId}.fileprovider).
          # Toolless (no aapt in this job): unzip the binary manifest, pull the UTF-16 string.
          appid_of() { unzip -p "$1" AndroidManifest.xml 2>/dev/null | strings -e l \
            | grep -oE '[a-zA-Z0-9._]+\.fileprovider' | head -1 | sed 's/\.fileprovider$//'; }
          attach() { mv "$1" "files/${2}.apk"; ASSETS+=("files/${2}.apk"); }

          # Plus (standard) — uniquely af.shizuku.plus.api. Fail the release if it's missing.
          PLUS_APK=""
          for f in $(find files -name "*.apk" -type f 2>/dev/null); do
            [ "$(appid_of "$f")" = "af.shizuku.plus.api" ] && { PLUS_APK="$f"; break; }
          done
          [ -z "$PLUS_APK" ] && { echo "::error::Standard af.shizuku.plus.api APK missing from build artifacts"; exit 1; }
          attach "$PLUS_APK" "Shizuku+-${VERSION}"

          # Drop-In and the Compat stub BOTH use moe.shizuku.privileged.api. The Drop-In is the full
          # manager (~5-6 MB); the Compat stub is tiny — so the Drop-In is the largest such APK outside
          # files/compat. Optional (a build may not produce one).
          DROPIN_APK=$(for f in $(find files/main files/dropin -name "*.apk" -type f 2>/dev/null); do
            [ "$(appid_of "$f")" = "moe.shizuku.privileged.api" ] && stat -c '%s %n' "$f"
          done | sort -rn | head -1 | cut -d' ' -f2-)
          [ -n "$DROPIN_APK" ] && attach "$DROPIN_APK" "Shizuku+-Drop-In-${VERSION}"

          COMPAT_APK=$(find files/compat -name "*.apk" -type f 2>/dev/null | head -1)
          [ -n "$COMPAT_APK" ] && attach "$COMPAT_APK" "Shizuku+-Compat-Hub-${VERSION}"

          gh release create "$TAG_NAME" "${ASSETS[@]}" --title "$VERSION" --notes-file release_notes.md
