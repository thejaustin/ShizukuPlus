name: Build App

on:
  push:
    branches:
      - master
  workflow_dispatch:
    inputs:
      debug:
        description: 'Debug'
        type: boolean
        required: false
        default: false
      prerelease:
        description: 'Prerelease'
        type: boolean
        required: false
        default: false

jobs:
  build:
    runs-on: ubuntu-latest
    
    env:
      ANDROID_HOME: "/usr/local/lib/android/sdk"
      KEYSTORE: ${{ secrets.KEYSTORE }}
      SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
      SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
      IS_DEBUG: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.debug == true }}
      IS_PRERELEASE: ${{ (github.event_name == 'push' && github.ref_name == 'master') || (github.event_name == 'workflow_dispatch' && github.event.inputs.prerelease == true) }}

    outputs:
      artifactName: ${{ steps.buildWithGradle.outputs.artifactName }}
      versionName: ${{ steps.buildWithGradle.outputs.versionName }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'
          fetch-depth: 0

      - name: Pre-Push Guard
        run: |
          chmod +x pre-push-guard/scripts/pre_push_check.sh
          bash pre-push-guard/scripts/pre_push_check.sh

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Create signing.properties
        if: ${{ env.IS_DEBUG == 'false' && env.KEYSTORE != '' }}
        run: |
          echo KEYSTORE_PASSWORD=${{ secrets.KEYSTORE_PASSWORD }} > signing.properties
          echo KEYSTORE_ALIAS=${{ secrets.KEYSTORE_ALIAS }} >> signing.properties
          echo KEYSTORE_ALIAS_PASSWORD='${{ secrets.KEYSTORE_ALIAS_PASSWORD }}' >> signing.properties
          echo KEYSTORE_FILE=../key.jks >> signing.properties
          printf "%s" "${{ secrets.KEYSTORE }}" | base64 --decode > key.jks

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          build-scan-publish: true
          build-scan-terms-of-use-url: "https://gradle.com/terms-of-service"
          build-scan-terms-of-use-agree: "yes"

      - name: Build with Gradle
        id: buildWithGradle
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null || true
          echo 'org.gradle.caching=true' >> gradle.properties
          echo 'org.gradle.parallel=true' >> gradle.properties
          [ -n "$SENTRY_DSN" ] && echo "SENTRY_DSN=${SENTRY_DSN}" >> gradle.properties || true

          if [ "$IS_DEBUG" = "true" ]; then
            CMD="./gradlew :manager:assembleDebug"
            APK_DIR="manager/build/outputs/apk/debug"
          else
            CMD="./gradlew :manager:assembleRelease"
            APK_DIR="manager/build/outputs/apk/release"
          fi

          [ "$IS_PRERELEASE" = "true" ] && CMD="$CMD -Pbeta"

          VERSION=$(./gradlew :manager:properties -q --console=plain | grep "^versionName:" | cut -d' ' -f2 | tr -d "'")
          echo "$VERSION" > version.txt

          export GRADLE_OPTS="-Xmx4g -XX:MaxMetaspaceSize=512m -XX:+HeapDumpOnOutOfMemoryError"
          eval $CMD --stacktrace --info -x uploadSentryProguardMappingsRelease -x uploadSentryNativeSymbolsForRelease -x sentryUploadSourceBundleRelease
          
          FILE=$(ls "$APK_DIR"/*.apk)
          ARTIFACT_NAME="shizukuplus.apk"
          [ "$IS_DEBUG" = "true" ] && ARTIFACT_NAME="shizukuplus-debug.apk"

          RENAMED="$FILE"
          if [ "$(basename "$FILE")" != "$ARTIFACT_NAME" ]; then
            RENAMED="$(dirname "$FILE")/$ARTIFACT_NAME"
            mv "$FILE" "$RENAMED"
          fi

          echo "artifactName=${ARTIFACT_NAME}" >> $GITHUB_OUTPUT
          echo "versionName=${VERSION}" >> $GITHUB_OUTPUT
          echo "filePath=${RENAMED}" >> $GITHUB_OUTPUT

      - name: Upload Sentry Debug Symbols
        if: ${{ env.SENTRY_AUTH_TOKEN != '' && env.IS_DEBUG == 'false' }}
        continue-on-error: true
        run: |
          ./gradlew :manager:uploadSentryProguardMappingsRelease :manager:uploadSentryNativeSymbolsForRelease

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.buildWithGradle.outputs.artifactName }}
          path: ${{ steps.buildWithGradle.outputs.filePath }}

      - name: Upload Version File
        uses: actions/upload-artifact@v4
        with:
          name: version-file
          path: version.txt

  # Instrumented JNI smoke tests — runs on an Android emulator to verify
  # libadb.so loads correctly and RegisterNatives succeeds.
  # Only runs on workflow_dispatch (manual/release builds) to avoid emulator
  # spin-up cost on every push to master.
  smoke-test:
    if: ${{ github.event_name == 'workflow_dispatch' }}
    needs: [build]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'
          fetch-depth: 0

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Enable KVM hardware acceleration
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Create signing.properties (debug key)
        run: |
          cat <<'EOF' > signing.properties
          KEYSTORE_PASSWORD=android
          KEYSTORE_ALIAS=androiddebugkey
          KEYSTORE_ALIAS_PASSWORD=android
          KEYSTORE_FILE=../debug.jks
          EOF
          keytool -genkeypair -v -keystore debug.jks -storepass android \
            -alias androiddebugkey -keypass android \
            -keyalg RSA -keysize 2048 -validity 1 \
            -dname "CN=Smoke Test, O=CI, C=US" 2>/dev/null

      - name: Run JNI smoke tests on emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30
          arch: x86_64
          profile: pixel_2
          emulator-options: -no-window -no-audio -no-boot-anim -gpu swiftshader_indirect
          disable-animations: true
          script: |
            yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null 2>&1 || true
            echo 'org.gradle.caching=true' >> gradle.properties
            ./gradlew :manager:connectedDebugAndroidTest \
              -Pandroid.testInstrumentationRunnerArguments.class=af.shizuku.manager.JniSmokeTest \
              --stacktrace 2>&1 | tee smoke-test.log
            grep -E "PASSED|FAILED|ERROR" smoke-test.log || true

      - name: Upload smoke test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-test-results
          path: manager/build/outputs/androidTest-results/

  release:
    # smoke-test is skipped (not failed) on push — skipped deps don't block this job.
    # On workflow_dispatch, smoke-test must pass before release proceeds.
    needs: [build, smoke-test]
    if: ${{ !failure() && !cancelled() && ((github.event_name == 'push' && github.ref_name == 'master') || (github.event_name == 'workflow_dispatch' && github.event.inputs.debug != true)) }}
    runs-on: ubuntu-latest
    permissions:
      contents: write

    env:
      IS_PRERELEASE: ${{ (github.event_name == 'push' && github.ref_name == 'master') || (github.event_name == 'workflow_dispatch' && github.event.inputs.prerelease == true) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download Version File
        uses: actions/download-artifact@v4
        with:
          name: version-file

      - name: Read Version
        id: version
        run: |
          VERSION=$(cat version.txt)
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Create Release Tag
        run: |
          TAG_NAME="v${VERSION}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git rev-parse "$TAG_NAME" >/dev/null 2>&1; then
            git tag -d "$TAG_NAME"
            git push origin ":refs/tags/$TAG_NAME" || true
          fi
          git tag "$TAG_NAME" -m "Release version $VERSION"
          git push origin "$TAG_NAME"

      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.build.outputs.artifactName }}
          path: files

      - name: Extract Release Notes
        id: release_notes
        run: |
          # Extract everything between '### 🔧 Improvements' and the next header starting with '#'
          # or the end of the file. Use a temporary file to store the notes.
          sed -n '/### 🔧 Improvements/,/^#/p' PRE_RELEASE_CHECKLIST.md | sed '$d' > release_notes.md
          echo "NOTES_FILE=release_notes.md" >> $GITHUB_ENV

      - name: Create Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG_NAME="v${VERSION}"
          FLAGS=""
          if [ "$IS_PRERELEASE" = "true" ]; then
            FLAGS="--prerelease"
          else
            FLAGS="--draft"
          fi

          APK_FILE=$(find files -name "*.apk" -type f | head -1)
          if [ -z "$APK_FILE" ]; then
            echo "ERROR: No APK found under files/" && exit 1
          fi
          echo "Attaching APK: $APK_FILE"
          gh release create "$TAG_NAME" "$APK_FILE" $FLAGS --title "Shizuku+ $VERSION" --notes-file release_notes.md
