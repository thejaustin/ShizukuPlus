name: Close Sentry Issues

on:
  workflow_dispatch:

jobs:
  close-issues:
    runs-on: ubuntu-latest
    steps:
      - name: Close issues
        uses: actions/github-script@v7
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
        with:
          script: |
            const issueIds = [
              "7355675448", "7375799709", "7381634908", "7386039071", "7325943452",
              "7325297776", "7371816524", "7358755935", "7355932107", "7355674928",
              "7330161987", "7389549107", "7389541521", "7368223133"
            ];
            
            const SENTRY_API = 'https://sentry.io/api/0';
            const SENTRY_HEADERS = {
              'Authorization': `Bearer ${process.env.SENTRY_AUTH_TOKEN}`,
              'Content-Type': 'application/json',
            };
            
            for (const issueId of issueIds) {
              core.info(`Resolving Sentry issue ${issueId}...`);
              const res = await fetch(`${SENTRY_API}/issues/${issueId}/`, {
                method: 'PUT',
                headers: SENTRY_HEADERS,
                body: JSON.stringify({ status: 'resolved' })
              });
              if (!res.ok) {
                const text = await res.text();
                core.error(`Failed to resolve ${issueId}: ${res.status} ${text}`);
              } else {
                core.info(`Successfully resolved ${issueId}`);
              }
            }
